<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpay 2025 Annual Report — IBM AI on Z</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* landing is one fixed screen */
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      background-color: #0d1a2e;
    }

    /* ── Full-screen background ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('/images/background.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* ── Everything sits above the background ── */
    .shell {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Credit card — tossed onto the Indian Ocean ──
       The Indian Ocean sits roughly at 62% from left, 52% from top
       on a 16:9 background image displayed cover. The card is
       rotated ~10° counter-clockwise to look casually tossed.   */
    .card-zone {
      position: absolute;
      /* Indian Ocean: between Africa (right edge ~48%) and Australia (left edge ~75%) */
      left: 58%;
      top: 48%;
      transform: translate(-50%, -50%) rotate(-10deg);
      cursor: pointer;
      text-decoration: none;
      /* Physical drop-shadow to suggest it's resting on the map */
      filter:
        drop-shadow(4px 8px 16px rgba(0,0,0,0.70))
        drop-shadow(1px 2px 4px rgba(0,0,0,0.50));
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .card-zone:hover,
    .card-zone:focus {
      transform: translate(-50%, -50%) rotate(-10deg) scale(1.05);
      filter:
        drop-shadow(6px 12px 24px rgba(0,0,0,0.80))
        drop-shadow(2px 3px 6px rgba(0,0,0,0.55));
      outline: none;
    }

    .card-zone:active {
      transform: translate(-50%, -50%) rotate(-10deg) scale(0.97);
    }

    .card-img {
      display: block;
      width: clamp(180px, 22vw, 320px);
      height: auto;
      border-radius: 10px;
    }

    /* ── Bottom bar: headline left, logos right ── */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px 22px;
      background: linear-gradient(to top, rgba(5,12,25,0.82) 0%, rgba(5,12,25,0) 100%);
      gap: 24px;
    }

    .bottom-headline {
      font-family: 'IBM Plex Serif', Georgia, serif;
      font-size: clamp(0.85rem, 1.6vw, 1.15rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.45;
      text-shadow: 0 1px 6px rgba(0,0,0,0.60);
      max-width: 480px;
    }

    .bottom-headline em {
      font-style: normal;
      color: #ffe082;
      font-weight: 600;
    }

    .bottom-logos {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo-corpay {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }

    .logo-corpay__caret { color: #da1e28; }

    .logo-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.30);
    }

    .logo-ibm {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      html, body { overflow: hidden; }

      .card-img {
        width: clamp(150px, 42vw, 220px);
      }

      /* On narrow screens the Indian Ocean shifts left slightly */
      .card-zone {
        left: 55%;
        top: 46%;
      }

      .bottom-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 14px 20px 18px;
      }

      .bottom-headline {
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background image -->
  <div class="bg"></div>

  <!-- Full-screen interactive layer -->
  <div class="shell">

    <!-- Credit card in the Indian Ocean -->
    <a class="card-zone"
       href="/report"
       aria-label="View IBM's analysis of Corpay's 2025 Annual Report">
      <img
        class="card-img"
        src="/images/creditcard.png"
        alt="Corpay Universal Fuel Card — tap to view analysis">
    </a>

    <!-- Bottom bar: headline + logos -->
    <div class="bottom-bar">
      <p class="bottom-headline">
        IBM reviewed Corpay's 2025 Annual Report.<br>
        <em>Tap the fuel card to see what we found.</em>
      </p>
      <div class="bottom-logos">
        <span class="logo-corpay">Corpay<span class="logo-corpay__caret">^</span></span>
        <div class="logo-divider"></div>
        <span class="logo-ibm">IBM</span>
      </div>
    </div>

  </div>

</body>
</html>
