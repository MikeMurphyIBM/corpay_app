<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpay 2025 Annual Report — IBM AI on Z</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* landing is one fixed screen */
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      background-color: #0d1a2e;
    }

    /* ── Full-screen background ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('/images/background.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* ── Everything sits above the background ── */
    .shell {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Fuel card — overlaid on top of the large card in the background image ── */
    .card-zone {
      position: absolute;
      left: 55%;
      top: 63%;
      transform: translate(-50%, -50%) rotate(-10deg);
      cursor: pointer;
      text-decoration: none;
      filter:
        drop-shadow(4px 8px 16px rgba(0,0,0,0.70))
        drop-shadow(1px 2px 4px rgba(0,0,0,0.50));
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .card-zone:hover,
    .card-zone:focus {
      transform: translateX(-50%) rotate(-10deg) scale(1.05);
      filter:
        drop-shadow(6px 12px 24px rgba(0,0,0,0.80))
        drop-shadow(2px 3px 6px rgba(0,0,0,0.55));
      outline: none;
    }

    .card-zone:active {
      transform: translateX(-50%) rotate(-10deg) scale(0.97);
    }

    .card-img {
      display: block;
      width: clamp(86px, 10.5vw, 153px); /* 25% smaller */
      height: auto;
      border-radius: 10px;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      html, body { overflow: hidden; }

      .card-img {
        width: clamp(100px, 36vw, 160px);
      }

      .card-zone {
        left: 52%;
        top: 58%;
      }
    }
  </style>
</head>
<body>

  <!-- Background image -->
  <div class="bg"></div>

  <!-- Full-screen interactive layer -->
  <div class="shell">

    <!-- Fuel card sits just above the bottom bar -->
    <a class="card-zone"
       href="/report"
       aria-label="View IBM's analysis of Corpay's 2025 Annual Report">
      <img
        class="card-img"
        src="/images/creditcard.png"
        alt="Corpay Universal Fuel Card — tap to view analysis">
    </a>


  </div>

</body>
</html>
