<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpay 2025 Annual Report — IBM AI on Z</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── LANDING PAGE STYLES ── */

    .landing-body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Full-viewport background */
    .landing-bg {
      position: fixed;
      inset: 0;
      background-image: url('/images/background.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Slight dark vignette so text pops */
    .landing-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(5, 12, 25, 0.35);
    }

    /* Everything above the background */
    .landing-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER: Corpay + IBM logos ── */
    .landing-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 28px 32px 0;
    }

    .landing-corpay-logo {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .landing-corpay-logo__caret {
      color: #da1e28;
    }

    .landing-divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.30);
    }

    .landing-ibm-logo {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.12em;
    }

    /* ── HEADLINE ── */
    .landing-headline-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 0;
      text-align: center;
    }

    .landing-headline {
      font-family: 'IBM Plex Serif', Georgia, serif;
      font-size: clamp(1.15rem, 3vw, 1.55rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.45;
      max-width: 620px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.55);
    }

    .landing-headline em {
      font-style: normal;
      color: #ffe082;
      font-weight: 600;
    }

    /* ── CREDIT CARD — tossed onto the map ── */
    .landing-card-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 340px;
    }

    .landing-card-link {
      display: block;
      /* Positioned in the Indian Ocean: centre-right of map, between Africa & Australia */
      position: absolute;
      top: 50%;
      left: 58%;
      transform: translate(-50%, -50%) rotate(8deg);
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      text-decoration: none;
      /* Realistic tossed-card shadow */
      filter: drop-shadow(6px 12px 18px rgba(0,0,0,0.55))
              drop-shadow(0 2px 4px rgba(0,0,0,0.35));
    }

    .landing-card-link:hover,
    .landing-card-link:focus {
      transform: translate(-50%, -50%) rotate(8deg) scale(1.04);
      filter: drop-shadow(8px 16px 24px rgba(0,0,0,0.65))
              drop-shadow(0 3px 6px rgba(0,0,0,0.40));
      outline: none;
    }

    .landing-card-link:active {
      transform: translate(-50%, -50%) rotate(8deg) scale(0.98);
    }

    .landing-card-img {
      width: clamp(200px, 28vw, 340px);
      height: auto;
      display: block;
      border-radius: 12px;
    }

    /* Subtle tap hint label below card on mobile */
    .landing-tap-hint {
      position: absolute;
      top: calc(50% + clamp(110px, 16vw, 190px));
      left: 58%;
      transform: translateX(-50%) rotate(8deg);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    .landing-footer {
      padding: 16px 32px 24px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.30);
      letter-spacing: 0.04em;
    }

    /* ── MOBILE adjustments ── */
    @media (max-width: 640px) {
      .landing-bg {
        background-attachment: scroll;
        position: fixed; /* keep fixed so it shows on iOS too */
      }

      .landing-card-link {
        /* On small screens centre it more */
        left: 52%;
        top: 52%;
      }

      .landing-tap-hint {
        left: 52%;
      }
    }
  </style>
</head>
<body class="landing-body">

  <!-- Full-screen background -->
  <div class="landing-bg"></div>

  <div class="landing-shell">

    <!-- Header: Corpay + IBM -->
    <header class="landing-header">
      <div class="landing-corpay-logo">Corpay<span class="landing-corpay-logo__caret">^</span></div>
      <div class="landing-divider"></div>
      <div class="landing-ibm-logo">IBM</div>
    </header>

    <!-- Headline -->
    <div class="landing-headline-wrap">
      <p class="landing-headline">
        IBM reviewed Corpay's 2025 Annual Report.<br>
        <em>Tap the fuel card to see what we found.</em>
      </p>
    </div>

    <!-- Credit card tossed onto the Indian Ocean -->
    <div class="landing-card-area">
      <a href="/report" class="landing-card-link" aria-label="View the IBM analysis of Corpay's 2025 Annual Report">
        <img src="/images/creditcard.png" alt="Corpay Universal Fuel Card" class="landing-card-img">
      </a>
      <span class="landing-tap-hint">Tap to open →</span>
    </div>

    <!-- Footer -->
    <footer class="landing-footer">
      Prepared by IBM for Corpay · Based on Corpay's 2025 Form 10-K
    </footer>

  </div>

</body>
</html>
