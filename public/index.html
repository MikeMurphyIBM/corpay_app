<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpay 2025 Annual Report — IBM AI on Z</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* landing is one fixed screen */
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      background-color: #0d1a2e;
    }

    /* ── Full-screen background ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('/images/background.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* ── Everything sits above the background ── */
    .shell {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Fuel card — overlaid on top of the large card in the background image ── */
    .card-zone {
      position: absolute;
      left: 55%;
      top: 63%;
      transform: translate(-50%, -50%) rotate(-10deg);
      cursor: pointer;
      text-decoration: none;
      filter:
        drop-shadow(4px 8px 16px rgba(0,0,0,0.70))
        drop-shadow(1px 2px 4px rgba(0,0,0,0.50));
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .card-zone:hover,
    .card-zone:focus {
      transform: translateX(-50%) rotate(-10deg) scale(1.05);
      filter:
        drop-shadow(6px 12px 24px rgba(0,0,0,0.80))
        drop-shadow(2px 3px 6px rgba(0,0,0,0.55));
      outline: none;
    }

    .card-zone:active {
      transform: translateX(-50%) rotate(-10deg) scale(0.97);
    }

    .card-img {
      display: block;
      width: clamp(86px, 10.5vw, 153px); /* 25% smaller */
      height: auto;
      border-radius: 10px;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      html, body { overflow: hidden; }

      .card-img {
        width: clamp(100px, 36vw, 160px);
      }

      .card-zone {
        left: 52%;
        top: 58%;
      }
    }

    /* ── Rotate prompt ── */
    .rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(7,17,31,0.96);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 32px;
    }

    .rotate-prompt__icon {
      width: 64px;
      height: 64px;
      animation: rotate-hint 2s ease-in-out infinite;
    }

    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      40%       { transform: rotate(90deg); }
      60%       { transform: rotate(90deg); }
    }

    .rotate-prompt p {
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      max-width: 280px;
    }

    .rotate-prompt__dismiss {
      margin-top: 8px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      text-decoration: underline;
    }

    @media (max-width: 768px) and (orientation: portrait) {
      .rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>

  <!-- Rotate prompt (portrait mobile only) -->
  <div class="rotate-prompt" id="rotatePrompt" role="dialog" aria-label="Please rotate your device">
    <svg class="rotate-prompt__icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="18" y="8" width="28" height="48" rx="4" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
      <rect x="22" y="14" width="20" height="36" rx="1" fill="rgba(15,98,254,0.2)" stroke="rgba(15,98,254,0.4)" stroke-width="1"/>
      <circle cx="32" cy="54" r="2" fill="rgba(255,255,255,0.4)"/>
      <path d="M44 30 L56 30 M50 24 L56 30 L50 36" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p>For the best experience, please rotate your device to <strong style="color:#fff">landscape</strong> orientation to view the full map and desk.</p>
    <button class="rotate-prompt__dismiss" id="rotatePromptDismiss">Continue anyway</button>
  </div>

  <!-- Background image -->
  <div class="bg"></div>

  <!-- Full-screen interactive layer -->
  <div class="shell">

    <!-- Fuel card sits just above the bottom bar -->
    <a class="card-zone"
       href="/report"
       aria-label="View IBM's analysis of Corpay's 2025 Annual Report">
      <img
        class="card-img"
        src="/images/creditcard.png"
        alt="Corpay Universal Fuel Card — tap to view analysis">
    </a>


  </div>

  <script>
    (function () {
      var prompt = document.getElementById('rotatePrompt');
      var dismiss = document.getElementById('rotatePromptDismiss');

      dismiss.addEventListener('click', function () {
        prompt.style.display = 'none';
      });

      window.addEventListener('orientationchange', function () {
        setTimeout(function () {
          if (window.innerWidth > window.innerHeight) {
            prompt.style.display = 'none';
          }
        }, 300);
      });
    })();
  </script>

</body>
</html>
