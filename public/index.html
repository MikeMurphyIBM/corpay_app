<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpay 2025 Annual Report — IBM AI on Z</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* landing is one fixed screen */
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      background-color: #0d1a2e;
    }

    /* ── Full-screen background ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('/images/background.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* ── Everything sits above the background ── */
    .shell {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Card + caption group — centered on the Indian Ocean ── */
    .card-group {
      position: absolute;
      left: 58%;
      top: 48%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .card-zone {
      display: block;
      transform: rotate(-10deg);
      cursor: pointer;
      text-decoration: none;
      filter:
        drop-shadow(4px 8px 16px rgba(0,0,0,0.70))
        drop-shadow(1px 2px 4px rgba(0,0,0,0.50));
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .card-zone:hover,
    .card-zone:focus {
      transform: rotate(-10deg) scale(1.05);
      filter:
        drop-shadow(6px 12px 24px rgba(0,0,0,0.80))
        drop-shadow(2px 3px 6px rgba(0,0,0,0.55));
      outline: none;
    }

    .card-zone:active {
      transform: rotate(-10deg) scale(0.97);
    }

    .card-img {
      display: block;
      width: clamp(180px, 22vw, 320px);
      height: auto;
      border-radius: 10px;
    }

    /* ── Caption sits directly below the card ── */
    .card-caption {
      font-family: 'IBM Plex Serif', Georgia, serif;
      font-size: clamp(0.80rem, 1.4vw, 1.05rem);
      font-weight: 400;
      color: #fff;
      text-align: center;
      line-height: 1.5;
      text-shadow: 0 1px 6px rgba(0,0,0,0.70);
      max-width: 340px;
      background: rgba(5,12,25,0.45);
      padding: 8px 14px;
      border-radius: 6px;
    }

    /* ── Logos pinned to bottom-right ── */
    .bottom-logos {
      position: absolute;
      bottom: 22px;
      right: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo-corpay {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }

    .logo-corpay__caret { color: #da1e28; }

    .logo-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.30);
    }

    .logo-ibm {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      html, body { overflow: hidden; }

      .card-img {
        width: clamp(150px, 42vw, 220px);
      }

      .card-group {
        left: 55%;
        top: 46%;
      }

      .card-caption {
        font-size: 0.82rem;
        max-width: 260px;
      }

      .bottom-logos {
        bottom: 14px;
        right: 18px;
      }
    }
  </style>
</head>
<body>

  <!-- Background image -->
  <div class="bg"></div>

  <!-- Full-screen interactive layer -->
  <div class="shell">

    <!-- Card + caption grouped together over the Indian Ocean -->
    <div class="card-group">
      <a class="card-zone"
         href="/report"
         aria-label="View IBM's analysis of Corpay's 2025 Annual Report">
        <img
          class="card-img"
          src="/images/creditcard.png"
          alt="Corpay Universal Fuel Card — tap to view analysis">
      </a>
      <p class="card-caption">
        IBM reviewed Corpay's 2025 Annual Report—Tap the Fuel Card to see what we found.
      </p>
    </div>

    <!-- Logos pinned bottom-right -->
    <div class="bottom-logos">
      <span class="logo-corpay">Corpay<span class="logo-corpay__caret">^</span></span>
      <div class="logo-divider"></div>
      <span class="logo-ibm">IBM</span>
    </div>

  </div>

</body>
</html>
