<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpay — IBM Briefings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
    background-color: #07111f;
  }

  /* ── Background ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('/images/2ndpagebackground.jpg');
    background-size: cover; background-position: center;
    pointer-events: none;
  }

  /* ── Corpay logo ── */
  .corpay-logo {
    position: fixed; top: 20px; left: 24px; z-index: 300;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 1.05rem;
    font-weight: 700; color: #fff; letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 2px; text-decoration: none;
  }
  .corpay-logo__caret { color: #da1e28; font-size: 1.1rem; line-height: 1; }

  /* ── Prompt text ── */
  .scene-prompt {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    z-index: 300; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: rgba(255,255,255,0.35);
    white-space: nowrap;
  }

  /* ── Desk scene container ── */
  .desk-scene {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    gap: clamp(40px, 6vw, 100px);
  }

  /* ══════════════════════════════════════════════
     LEATHER BOOK  (AI on Z)
  ══════════════════════════════════════════════ */
  .book-item {
    position: relative;
    transform: perspective(900px) rotateY(6deg) rotateX(2deg) rotate(-2deg);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    cursor: pointer; text-decoration: none; display: block;
    border-radius: 4px 6px 6px 4px;
    box-shadow:
      -8px 4px 0px #3a2510,
      -10px 6px 6px rgba(0,0,0,0.55),
      8px 20px 48px rgba(0,0,0,0.75),
      2px 4px 8px rgba(0,0,0,0.4);
    width: clamp(180px, 18vw, 280px);
    height: clamp(240px, 26vw, 380px);
  }

  .book-item:hover {
    transform: perspective(900px) rotateY(10deg) rotateX(3deg) rotate(-2.5deg) translateY(-10px);
    box-shadow:
      -10px 5px 0px #3a2510,
      -13px 8px 10px rgba(0,0,0,0.6),
      14px 30px 64px rgba(0,0,0,0.85),
      2px 4px 8px rgba(0,0,0,0.4);
  }

  .book-item__face {
    width: 100%; height: 100%;
    background: linear-gradient(160deg,
      #7a4a1e 0%, #5c3310 20%, #6b3d14 40%,
      #4a2808 60%, #5c3310 80%, #6e4018 100%);
    border-radius: 4px 6px 6px 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: clamp(20px, 2.5vw, 36px) clamp(16px, 2vw, 28px) clamp(20px, 2.5vw, 36px) clamp(22px, 2.8vw, 40px);
    position: relative; overflow: hidden;
  }

  /* leather grain */
  .book-item__face::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(92deg, transparent 0px, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 3px),
      repeating-linear-gradient(2deg, transparent 0px, transparent 4px, rgba(0,0,0,0.025) 4px, rgba(0,0,0,0.025) 5px);
    border-radius: inherit; pointer-events: none;
  }

  /* spine highlight */
  .book-item__face::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 18px;
    background: linear-gradient(90deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 40%, transparent 100%);
    border-right: 1px solid rgba(0,0,0,0.3); pointer-events: none;
  }

  .book-item__bar { width: 100%; height: 2px; background: rgba(15,98,254,0.9); margin-bottom: clamp(14px,1.8vw,24px); box-shadow: 0 0 8px rgba(15,98,254,0.4); }
  .book-item__eyebrow { font-size: clamp(0.48rem,0.6vw,0.58rem); font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(235,210,170,0.6); margin-bottom: clamp(10px,1.4vw,16px); text-align: center; }
  .book-item__title { font-family: 'IBM Plex Serif', Georgia, serif; font-size: clamp(0.85rem,1.1vw,1.25rem); font-weight: 700; color: #f0ddb0; text-shadow: 0 1px 2px rgba(0,0,0,0.6); line-height: 1.25; text-align: center; margin-bottom: 8px; }
  .book-item__subtitle { font-size: clamp(0.55rem,0.65vw,0.68rem); color: rgba(220,185,130,0.5); text-align: center; line-height: 1.5; margin-bottom: clamp(14px,1.8vw,24px); }
  .book-item__logo { font-size: clamp(0.7rem,0.85vw,0.9rem); font-weight: 700; letter-spacing: 0.12em; color: rgba(220,185,130,0.65); }
  .book-item__hint { position: absolute; bottom: 14px; right: 14px; font-size: 0.58rem; color: rgba(220,185,130,0.28); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ══════════════════════════════════════════════
     LEATHER PAMPHLET  (Concert)
  ══════════════════════════════════════════════ */
  .pamphlet-item {
    position: relative;
    transform: perspective(900px) rotateY(-4deg) rotateX(1deg) rotate(3deg);
    transition: transform 0.35s ease, filter 0.35s ease;
    cursor: pointer; text-decoration: none; display: block;
    width: clamp(140px, 14vw, 220px);
    height: clamp(190px, 21vw, 310px);
    filter: drop-shadow(6px 16px 32px rgba(0,0,0,0.7)) drop-shadow(2px 4px 8px rgba(0,0,0,0.4));
  }

  .pamphlet-item:hover {
    transform: perspective(900px) rotateY(-7deg) rotateX(2deg) rotate(3.5deg) translateY(-10px);
    filter: drop-shadow(8px 22px 44px rgba(0,0,0,0.85)) drop-shadow(2px 4px 8px rgba(0,0,0,0.5));
  }

  /* Stack of pages — visible edges on right side */
  .pamphlet-item__pages {
    position: absolute;
    top: 3px; right: -5px; bottom: 0; width: 100%;
    background: linear-gradient(90deg, #e8e0cc 0%, #d4c9b0 100%);
    border-radius: 2px 4px 4px 2px;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
  }

  /* Page edge lines */
  .pamphlet-item__pages::before {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0; width: 100%;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
    );
    border-radius: inherit;
  }

  /* Cover face */
  .pamphlet-item__face {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    background: linear-gradient(150deg,
      #6b3d14 0%, #4a2808 30%, #5c3310 60%, #7a4a1e 100%);
    border-radius: 3px 4px 4px 3px;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: flex-start;
    padding: clamp(14px,1.8vw,22px) clamp(12px,1.5vw,18px);
    overflow: hidden;
  }

  /* leather grain on pamphlet */
  .pamphlet-item__face::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(92deg, transparent 0px, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 3px),
      repeating-linear-gradient(2deg, transparent 0px, transparent 4px, rgba(0,0,0,0.025) 4px, rgba(0,0,0,0.025) 5px);
    pointer-events: none;
  }

  /* Leather cord binding — top-left corner */
  .pamphlet-item__cord {
    position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none;
  }

  .pamphlet-item__eyebrow { font-size: clamp(0.44rem,0.52vw,0.54rem); font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(235,210,170,0.55); margin-bottom: clamp(8px,1vw,14px); position: relative; z-index: 1; margin-top: clamp(10px,1.2vw,16px); }
  .pamphlet-item__title { font-family: 'IBM Plex Serif', Georgia, serif; font-size: clamp(0.78rem,0.95vw,1.1rem); font-weight: 700; color: #f0ddb0; text-shadow: 0 1px 2px rgba(0,0,0,0.6); line-height: 1.3; margin-bottom: 8px; position: relative; z-index: 1; }
  .pamphlet-item__subtitle { font-size: clamp(0.5rem,0.58vw,0.62rem); color: rgba(220,185,130,0.48); line-height: 1.5; position: relative; z-index: 1; }
  .pamphlet-item__logo { font-size: clamp(0.62rem,0.75vw,0.8rem); font-weight: 700; letter-spacing: 0.12em; color: rgba(220,185,130,0.55); z-index: 1; position: relative; text-align: center; width: 100%; }
  .pamphlet-item__hint { position: absolute; bottom: 14px; right: 14px; font-size: 0.54rem; color: rgba(220,185,130,0.25); letter-spacing: 0.08em; text-transform: uppercase; z-index: 1; }

  /* ── Rotate prompt ── */
  .rotate-prompt {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(7,17,31,0.96); flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    text-align: center; padding: 32px;
  }
  .rotate-prompt__icon { width: 64px; height: 64px; animation: rotate-hint 2s ease-in-out infinite; }
  @keyframes rotate-hint {
    0%, 100% { transform: rotate(0deg); }
    40%       { transform: rotate(90deg); }
    60%       { transform: rotate(90deg); }
  }
  .rotate-prompt p { font-size: 1rem; color: rgba(255,255,255,0.75); line-height: 1.6; max-width: 280px; }
  .rotate-prompt__dismiss { margin-top: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.35); cursor: pointer; background: none; border: none; font-family: inherit; text-decoration: underline; }
  @media (max-width: 768px) and (orientation: portrait) { .rotate-prompt { display: flex; } }
  </style>
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>

  <a class="corpay-logo" href="/">Corpay<span class="corpay-logo__caret">^</span></a>
  <span class="scene-prompt">Select a briefing to open</span>

  <!-- Rotate prompt -->
  <div class="rotate-prompt" id="rotatePrompt" role="dialog" aria-label="Please rotate your device">
    <svg class="rotate-prompt__icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="18" y="8" width="28" height="48" rx="4" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
      <rect x="22" y="14" width="20" height="36" rx="1" fill="rgba(15,98,254,0.2)" stroke="rgba(15,98,254,0.4)" stroke-width="1"/>
      <circle cx="32" cy="54" r="2" fill="rgba(255,255,255,0.4)"/>
      <path d="M44 30 L56 30 M50 24 L56 30 L50 36" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p>For the best experience, please rotate your device to <strong style="color:#fff">landscape</strong> orientation.</p>
    <button class="rotate-prompt__dismiss" id="rotatePromptDismiss">Continue anyway</button>
  </div>

  <!-- Desk scene -->
  <div class="desk-scene">

    <!-- LEATHER BOOK — AI on Z -->
    <a class="book-item" href="/aionz" aria-label="Open IBM AI on Z briefing">
      <div class="book-item__face">
        <div class="book-item__bar"></div>
        <span class="book-item__eyebrow">IBM · Corpay 2025</span>
        <h2 class="book-item__title">AI on IBM Z</h2>
        <p class="book-item__subtitle">Five AI Opportunities<br>from the Form 10-K</p>
        <div style="width:32px;height:1px;background:rgba(15,98,254,0.5);margin-bottom:12px;"></div>
        <span class="book-item__logo">IBM</span>
        <span class="book-item__hint">Open →</span>
      </div>
    </a>

    <!-- LEATHER PAMPHLET — Concert -->
    <a class="pamphlet-item" href="/concert" aria-label="Open IBM Concert briefing">
      <div class="pamphlet-item__pages"></div>
      <div class="pamphlet-item__face">
        <!-- Leather cord SVG — top left corner binding -->
        <svg class="pamphlet-item__cord" width="54" height="54" viewBox="0 0 54 54" fill="none">
          <path d="M4 4 Q14 2 16 16 Q18 28 8 30 Q2 32 4 4" stroke="#2a1505" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M4 4 Q2 14 16 16 Q28 18 30 8 Q32 2 4 4" stroke="#2a1505" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="16" cy="16" r="4.5" fill="#3d1f08" stroke="#1a0c02" stroke-width="1"/>
          <circle cx="16" cy="16" r="2" fill="#5c3010"/>
          <path d="M16 20 Q15 30 12 38" stroke="#2a1505" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M20 16 Q30 15 38 12" stroke="#2a1505" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <!-- Blue bar sits below the cord area -->
        <div class="pamphlet-item__bar" style="width:100%;height:2px;background:rgba(15,98,254,0.9);margin-top:clamp(18px,2.5vw,30px);margin-bottom:clamp(8px,1vw,12px);box-shadow:0 0 8px rgba(15,98,254,0.4);position:relative;z-index:1;"></div>
        <span class="pamphlet-item__eyebrow">IBM · Corpay 2025</span>
        <h2 class="pamphlet-item__title">IBM Concert</h2>
        <p class="pamphlet-item__subtitle">IT Operations Briefing<br>for Corpay</p>
        <div style="width:32px;height:1px;background:rgba(15,98,254,0.5);margin-bottom:12px;position:relative;z-index:1;"></div>
        <span class="pamphlet-item__logo">IBM</span>
        <span class="pamphlet-item__hint">Open →</span>
      </div>
    </a>

  </div>

  <script>
  (function () {
    var dismiss = document.getElementById('rotatePromptDismiss');
    var prompt  = document.getElementById('rotatePrompt');
    if (dismiss) dismiss.addEventListener('click', function () { prompt.style.display = 'none'; });
    window.addEventListener('orientationchange', function () {
      setTimeout(function () {
        if (window.innerWidth > window.innerHeight) prompt.style.display = 'none';
      }, 300);
    });
  })();
  </script>

</body>
</html>
